name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20.19.x, 22.13.x, 24.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Provide dummy secrets so JWT/SIGN don't generate random per-test
          JWT_SECRET: ci-jwt-secret-do-not-use-in-prod-0000000000000000
          SIGN_SECRET: ci-sign-secret-do-not-use-in-prod-000000000000000
          NODE_ENV: test

      - name: Lint (if eslint configured)
        run: |
          if [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f eslint.config.js ]; then
            npx eslint . --ext .js,.mjs || true
          else
            echo "No ESLint config found, skipping lint"
          fi
        continue-on-error: true

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (high+ severity only)
        run: npm audit --audit-level=high
        continue-on-error: false
