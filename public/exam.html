<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang Làm Bài — EasyRevise</title>

    <!-- Theme: apply before render to prevent flash -->
    <script>
        (function(){var t=localStorage.getItem('easyrevise_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
    </script>

    <!-- CSS: New modular system -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages/exam.css">

    <!-- Vendors: KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        .exam-layout {
            display: grid;
            grid-template-columns: 1fr 200px;
            gap: 1.25rem;
            align-items: flex-start;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 1rem;
        }

        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
            padding: 0.75rem;
        }

        .sidebar-title {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .q-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin-bottom: 0.5rem;
        }

        .q-cell {
            width: 100%;
            height: 28px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.12s ease;
            background: white;
            color: var(--text-muted);
            position: relative;
        }

        .q-cell:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .q-cell.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .q-cell.visited {
            border-color: #f59e0b;
            background: #fef9c3;
            color: #92400e;
        }

        .q-cell.answered {
            border-color: #16a34a;
            background: #dcfce7;
            color: #15803d;
        }

        .q-cell.flagged::after {
            content: '';
            position: absolute;
            top: 1px;
            right: 1px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #dc2626;
        }

        .legend-mini {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .legend-mini span {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .ldot {
            width: 6px;
            height: 6px;
            border-radius: 2px;
            display: inline-block;
        }

        .sidebar-nav {
            display: flex;
            gap: 3px;
        }

        .sidebar-nav .btn {
            flex: 1;
            padding: 0.35rem 0;
            font-size: 0.75rem;
            border-radius: 8px;
            text-align: center;
        }

        .sidebar-summary {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        /* Question */
        .essay-input {
            width: 100%;
            min-height: 200px;
            padding: 1.25rem;
            background: var(--bg-body);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1.05rem;
            line-height: 1.7;
            resize: vertical;
            font-family: inherit;
        }

        .essay-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .cues-box {
            margin-bottom: 1.5rem;
            padding: 1.25rem;
            background: #fffbeb;
            border: 1px solid #fef08a;
            border-radius: 12px;
        }

        .cues-list {
            list-style: none;
            padding-left: 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .cues-list li {
            margin-bottom: 0.5rem;
        }

        .timer-badge {
            font-weight: 600;
            color: var(--primary);
            background: var(--primary-light);
            padding: 0.4rem 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .question-number {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.75rem;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .flag-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .flag-btn:hover {
            border-color: #dc2626;
            color: #dc2626;
        }

        .flag-btn.flagged {
            background: #fef2f2;
            border-color: #dc2626;
            color: #dc2626;
        }

        .exit-btn {
            padding: 0.35rem 0.6rem;
            font-size: 0.8rem;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }

        .exit-btn:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .exam-layout {
                grid-template-columns: 1fr;
            }

            .sidebar-desktop {
                display: none;
            }

            .mobile-drawer {
                display: block;
            }

            body {
                padding-bottom: 70px;
            }
        }

        @media (min-width: 769px) {
            .mobile-drawer {
                display: none;
            }
        }

        .mobile-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
            border-radius: 16px 16px 0 0;
        }

        .drawer-handle {
            display: flex;
            justify-content: center;
            padding: 0.5rem;
            cursor: pointer;
        }

        .drawer-handle-bar {
            width: 36px;
            height: 3px;
            border-radius: 2px;
            background: var(--border);
        }

        .drawer-nav-m {
            display: flex;
            gap: 0.5rem;
            padding: 0 0.75rem 0.75rem;
        }

        .drawer-nav-m .btn {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.85rem;
        }

        .drawer-content {
            padding: 0 0.75rem 0.75rem;
            max-height: 45vh;
            overflow-y: auto;
            display: none;
        }

        .drawer-content.open {
            display: block;
        }

        .drawer-content .q-grid {
            grid-template-columns: repeat(8, 1fr);
        }

        @media (max-width: 480px) {
            .drawer-content .q-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        /* Essay Upload Zone */
        .essay-upload-area {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-input);
            border: 1.5px dashed var(--border);
            border-radius: 12px;
        }

        .essay-attach-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 0.75rem;
        }

        .essay-attach-item {
            position: relative;
        }

        .essay-attach-thumb {
            width: 90px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            cursor: zoom-in;
            border: 2px solid var(--border);
            transition: transform 0.15s;
        }

        .essay-attach-thumb:hover {
            transform: scale(1.04);
        }

        .essay-attach-thumb.zoomed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            border-radius: 0;
            cursor: zoom-out;
            max-width: none;
        }

        .essay-attach-pdf {
            width: 90px;
            height: 70px;
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.2rem;
            background: #fff7ed;
            font-size: 1.5rem;
        }

        .essay-attach-remove {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #dc2626;
            color: white;
            border: none;
            font-size: 0.65rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
            line-height: 1;
        }

        .essay-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .essay-upload-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* Timer warning animations */
        @keyframes pulse-warning {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        @keyframes pulse-danger {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.7;
                transform: scale(1.12);
            }
        }

        .timer-warning {
            animation: pulse-warning 2s ease-in-out infinite;
        }

        .timer-danger {
            animation: pulse-danger 0.8s ease-in-out infinite;
            box-shadow: 0 0 16px rgba(220, 38, 38, 0.5);
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 1100px;">
        <header class="header-nav" style="margin-bottom: 0.75rem;">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <button onclick="exitExam()" class="exit-btn" title="Thoát">✕ Thoát</button>
                <div>
                    <h1 id="examTitle" style="font-size: 1.25rem; margin-bottom: 0;">Nạp đề...</h1>
                    <p id="sectionTitle" style="color: var(--text-muted); font-size: 0.8rem; margin: 0;">Section</p>
                </div>
            </div>
            <div id="countdown" class="timer-badge">00:00</div>
        </header>

        <div style="margin-bottom: 1rem;">
            <div class="progress-container" style="margin-bottom: 0.25rem;">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted);">
                <span id="questionCount">Câu 0/0</span>
                <span id="completionPercent">0% Hoàn thành</span>
            </div>
        </div>

        <div class="exam-layout">
            <!-- Question Area -->
            <main>
                <div id="questionWrapper" class="glass-panel question-container">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <div id="questionNumber" class="question-number">Câu 1</div>
                        <button id="flagBtn" class="flag-btn" onclick="toggleFlag()">⚑ Đánh dấu</button>
                    </div>
                    <div id="instruction"
                        style="margin-bottom: 1rem; padding: 0.6rem 0.85rem; border-left: 3px solid var(--primary); background: var(--primary-light); border-radius: 0 8px 8px 0; font-size: 0.85rem; color: var(--text-secondary);">
                        Instruction</div>
                    <div id="passageContainer" class="passage-box" style="display: none;"></div>
                    <div id="questionText" class="question-text">Question text</div>
                    <div id="questionImageContainer" style="display:none;margin:0.75rem 0;"></div>
                    <div id="questionHintContainer" style="display:none;margin:0.75rem 0;"></div>
                    <div id="optionGrid" class="options-grid"></div>
                    <div id="essayArea" style="display: none;">
                        <div class="cues-box">
                            <strong style="display: block; margin-bottom: 0.5rem; color: #92400e;">Gợi ý:</strong>
                            <ul id="cuesList" class="cues-list"></ul>
                        </div>
                        <textarea id="essayInput" class="essay-input" placeholder="Viết đoạn văn tại đây..."></textarea>
                    </div>
                </div>
            </main>

            <!-- Right Sidebar (compact) -->
            <aside class="sidebar sidebar-desktop">
                <div class="sidebar-card">
                    <div class="sidebar-title">Câu hỏi</div>
                    <div id="answeredSummary" class="sidebar-summary">0/0</div>
                    <div id="qGrid" class="q-grid"></div>
                    <div class="legend-mini">
                        <span><span class="ldot"
                                style="background: white; border: 1px solid #cbd5e1;"></span>Chưa</span>
                        <span><span class="ldot" style="background: #fef9c3;"></span>Xem</span>
                        <span><span class="ldot" style="background: #dcfce7;"></span>Xong</span>
                        <span><span class="ldot"
                                style="background: #dc2626; width: 4px; height: 4px; border-radius: 50%;"></span>Cờ</span>
                    </div>
                    <div class="sidebar-nav">
                        <button id="prevBtn" class="btn"
                            style="background: var(--bg-input); color: var(--text-secondary);">←</button>
                        <button id="nextBtn" class="btn btn-primary">→</button>
                        <button id="submitBtn" class="btn btn-primary"
                            style="display: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); flex: 2;">Nộp
                            bài</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Mobile Bottom Drawer -->
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <div class="drawer-handle-bar"></div>
        </div>
        <div class="drawer-nav-m">
            <button id="prevBtnM" class="btn" style="background: var(--bg-input); color: var(--text-secondary);">←
                Trước</button>
            <button id="nextBtnM" class="btn btn-primary">Tiếp →</button>
            <button id="submitBtnM" class="btn btn-primary"
                style="display: none; background: linear-gradient(135deg, var(--primary), var(--secondary));">Nộp
                bài</button>
        </div>
        <div class="drawer-content" id="drawerContent">
            <div id="qGridM" class="q-grid" style="margin-bottom: 0.5rem;"></div>
        </div>
    </div>

    <script>
        function toggleDrawer() { document.getElementById('drawerContent').classList.toggle('open'); }
        // Block right-click & image drag on exam page
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
    </script>
    <script src="js/app.js"></script>
</body>

</html>
