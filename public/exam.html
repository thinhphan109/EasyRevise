<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang Làm Bài — EasyRevise</title>
    <meta name="description" content="Làm bài thi với giao diện trực quan, đếm ngược và lưu tự động.">

    <!-- Theme: apply before render to prevent flash -->
    <script>
        (function () { var t = localStorage.getItem('easyrevise_theme') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'); document.documentElement.setAttribute('data-theme', t); })();
    </script>

    <!-- CSS: Apple HIG modular system (tokens + components + exam page) -->
    <link rel="stylesheet" href="css/main.css">

    <!-- Vendors: KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>

<body class="exam-page">
    <!-- Sticky glass topbar -->
    <header class="exam-topbar">
        <div class="exam-container exam-topbar-inner">
            <button onclick="exitExam()" class="btn btn-ghost btn-sm" aria-label="Thoát bài thi">
                <span aria-hidden="true">✕</span>
                <span class="hide-mobile">Thoát</span>
            </button>
            <div class="exam-topbar-info">
                <div style="min-width:0;">
                    <h1 id="examTitle" class="exam-title">Nạp đề...</h1>
                    <p id="sectionTitle" class="exam-section">Section</p>
                </div>
            </div>
            <div id="countdown" class="timer-badge" aria-live="polite">00:00</div>
        </div>
    </header>

    <main class="exam-container">
        <!-- Progress bar -->
        <section class="exam-progress" aria-label="Tiến độ">
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div class="progress-meta">
                <span id="questionCount">Câu 0/0</span>
                <span id="completionPercent">0% Hoàn thành</span>
            </div>
        </section>

        <!-- Layout: question + sidebar -->
        <div class="exam-layout">
            <!-- Question card -->
            <article id="questionWrapper" class="exam-question-card">
                <div class="exam-question-header">
                    <span id="questionNumber" class="question-number">Câu 1</span>
                    <button id="flagBtn" class="flag-btn" onclick="toggleFlag()" aria-label="Đánh dấu câu hỏi">
                        <span aria-hidden="true">⚑</span>
                        <span>Đánh dấu</span>
                    </button>
                </div>
                <div id="instruction" class="instruction-block">Instruction</div>
                <div id="passageContainer" class="passage-box" style="display: none;"></div>
                <div id="questionText" class="question-text">Question text</div>
                <div id="questionImageContainer" style="display:none;margin:0.75rem 0;"></div>
                <div id="questionHintContainer" style="display:none;margin:0.75rem 0;"></div>
                <div id="optionGrid" class="options-grid"></div>
                <div id="essayArea" style="display: none;">
                    <div class="cues-box">
                        <strong class="cues-label">Gợi ý:</strong>
                        <ul id="cuesList" class="cues-list"></ul>
                    </div>
                    <textarea id="essayInput" class="essay-input" placeholder="Viết đoạn văn tại đây..."></textarea>
                </div>
            </article>

            <!-- Sidebar (desktop only) -->
            <aside class="exam-sidebar">
                <div class="sidebar-card">
                    <div class="sidebar-title">Câu hỏi</div>
                    <div id="answeredSummary" class="sidebar-summary">0/0</div>
                    <div id="qGrid" class="q-grid"></div>
                    <div class="legend-mini">
                        <span><span class="ldot ldot-empty"></span>Chưa</span>
                        <span><span class="ldot ldot-visited"></span>Xem</span>
                        <span><span class="ldot ldot-answered"></span>Xong</span>
                        <span><span class="ldot ldot-flagged"></span>Cờ</span>
                    </div>
                    <div class="sidebar-nav">
                        <button id="prevBtn" class="btn btn-secondary btn-sm" aria-label="Câu trước">←</button>
                        <button id="nextBtn" class="btn btn-primary btn-sm" aria-label="Câu sau">→</button>
                        <button id="submitBtn" class="btn btn-submit btn-sm" style="display:none;flex:2;">Nộp bài</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Mobile bottom drawer -->
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-handle" onclick="toggleDrawer()" role="button" tabindex="0" aria-label="Mở rộng danh sách câu">
            <div class="drawer-handle-bar"></div>
        </div>
        <div class="drawer-nav-m">
            <button id="prevBtnM" class="btn btn-secondary btn-sm">← Trước</button>
            <button id="nextBtnM" class="btn btn-primary btn-sm">Tiếp →</button>
            <button id="submitBtnM" class="btn btn-submit btn-sm" style="display:none;">Nộp bài</button>
        </div>
        <div class="drawer-content" id="drawerContent">
            <div id="qGridM" class="q-grid" style="margin-bottom: 0.5rem;"></div>
        </div>
    </div>

    <script>
        function toggleDrawer() { document.getElementById('drawerContent').classList.toggle('open'); }
        // Block right-click & image drag on exam page
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
    </script>
    <script src="js/components/swipe.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
