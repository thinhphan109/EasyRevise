<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyRevise - Ôn Tập Đề Cương Tiếng Anh</title>
    <meta name="description" content="Hệ thống ôn tập tiếng Anh hiệu quả với đề cương chi tiết, chấm điểm tự động và lời giải mở rộng.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .user-bar {
            display: flex; align-items: center; gap: 0.75rem;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--primary-light); color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem;
        }
        .auth-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .auth-modal.active { display: flex; }
        .auth-box {
            width: 90%; max-width: 420px; padding: 2.5rem;
            border-radius: 24px;
        }
        .auth-input {
            width: 100%; padding: 0.85rem 1rem; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 12px;
            font-size: 1rem; color: var(--text-main); font-family: inherit;
            margin-bottom: 1rem; transition: all 0.2s;
        }
        .auth-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .auth-error { color: var(--error); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .tab-switch {
            display: flex; background: var(--bg-input); border-radius: 10px; padding: 4px; margin-bottom: 1.5rem;
        }
        .tab-switch button {
            flex: 1; padding: 0.6rem; border-radius: 8px; border: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            background: transparent; color: var(--text-muted); transition: all 0.2s;
        }
        .tab-switch button.active { background: white; color: var(--text-main); box-shadow: var(--shadow-sm); }

        /* History */
        .history-item {
            padding: 1rem 1.25rem; margin-bottom: 0.75rem; border-radius: 14px;
            border: 1px solid var(--border); background: var(--bg-card);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: all 0.2s;
        }
        .history-item:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
        .history-score {
            font-size: 1.5rem; font-weight: 800; min-width: 60px; text-align: center;
        }
        .inprogress-card {
            padding: 1rem 1.25rem; margin-bottom: 0.75rem; border-radius: 14px;
            border: 2px solid #f59e0b; background: #fffbeb;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: all 0.2s;
        }
        .inprogress-card:hover { box-shadow: var(--shadow-md); border-color: #d97706; }
        .inprogress-badge {
            padding: 0.2rem 0.6rem; background: #fef3c7; color: #92400e;
            font-size: 0.7rem; font-weight: 700; border-radius: 6px; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h1>EasyRevise</h1>
                <p class="subtitle" style="margin-bottom: 0;">Hệ thống ôn tập đề cương Tiếng Anh thông minh</p>
            </div>
            <div class="user-bar">
                <div id="authArea">
                    <button class="btn" style="background: var(--primary-light); color: var(--primary); font-size: 0.9rem;" onclick="openAuthModal()">Đăng nhập</button>
                </div>
                <a href="/admin" class="btn" style="background: var(--bg-input); color: var(--text-muted); font-size: 0.85rem;">Admin</a>
            </div>
        </header>

        <section style="margin-top: 2rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--text-main); font-weight: 700;">Chọn đề ôn tập</h2>
            <div id="examList" class="exam-grid">
                <div style="text-align: center; padding: 4rem; color: var(--text-muted); grid-column: 1 / -1;">
                    <div style="font-size: 2rem; margin-bottom: 1rem;">⏳</div>
                    <p>Đang tải danh sách đề...</p>
                </div>
            </div>
        </section>

        <!-- In-Progress Section -->
        <section id="inProgressSection" style="margin-top: 2.5rem; display: none;">
            <h2 style="font-size: 1.3rem; margin-bottom: 1rem; color: #92400e; font-weight: 700;">📌 Bài đang làm dở</h2>
            <div id="inProgressList"></div>
        </section>

        <!-- History Section -->
        <section id="historySection" style="margin-top: 2.5rem; display: none;">
            <h2 style="font-size: 1.3rem; margin-bottom: 1rem; color: var(--text-main); font-weight: 700;">Lịch sử làm bài</h2>
            <div id="historyList"></div>
        </section>
    </div>

    <!-- Code Entry Modal -->
    <div id="codeModal" class="auth-modal">
        <div class="glass-panel auth-box" style="max-width:380px;">
            <h3 style="font-weight:700;margin-bottom:0.5rem;">🔒 Đề thi yêu cầu mã</h3>
            <p id="codeExamTitle" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;"></p>
            <div id="codeError" class="auth-error"></div>
            <input id="codeInput" class="auth-input" placeholder="Nhập mã kích hoạt" style="text-transform:uppercase;font-family:monospace;font-size:1.1rem;text-align:center;letter-spacing:3px;">
            <button class="btn btn-primary" style="width:100%;" onclick="submitCode()">Mở khóa</button>
            <button style="width:100%;margin-top:0.75rem;padding:0.5rem;background:none;border:none;color:var(--text-muted);font-size:0.85rem;cursor:pointer;" onclick="document.getElementById('codeModal').classList.remove('active')">Hủy</button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="glass-panel auth-box">
            <div class="tab-switch">
                <button id="tabLogin" class="active" onclick="switchTab('login')">Đăng nhập</button>
                <button id="tabRegister" onclick="switchTab('register')">Đăng ký</button>
            </div>

            <div id="authError" class="auth-error"></div>

            <div id="loginForm">
                <input id="loginUsername" class="auth-input" placeholder="Tên đăng nhập" autocomplete="username">
                <input id="loginPassword" class="auth-input" type="password" placeholder="Mật khẩu" autocomplete="current-password">
                <button class="btn btn-primary" style="width: 100%;" onclick="doLogin()">Đăng nhập</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input id="regDisplayName" class="auth-input" placeholder="Tên hiển thị">
                <input id="regUsername" class="auth-input" placeholder="Tên đăng nhập (≥3 ký tự)" autocomplete="username">
                <input id="regPassword" class="auth-input" type="password" placeholder="Mật khẩu (≥4 ký tự)" autocomplete="new-password">
                <button class="btn btn-primary" style="width: 100%;" onclick="doRegister()">Tạo tài khoản</button>
            </div>

            <button style="width: 100%; margin-top: 1rem; padding: 0.5rem; background: none; border: none; color: var(--text-muted); font-size: 0.85rem; cursor: pointer;" onclick="closeAuthModal()">Đóng</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Auth
        function openAuthModal() { document.getElementById('authModal').classList.add('active'); }
        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }

        function switchTab(tab) {
            document.getElementById('authError').style.display = 'none';
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('tabRegister').classList.add('active');
            }
        }

        function showAuthError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function doLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.error) return showAuthError(data.error);
                localStorage.setItem('easyrevise_token', data.token);
                localStorage.setItem('easyrevise_user', JSON.stringify(data));
                currentUser = data;
                closeAuthModal();
                updateAuthUI();
                loadHistory();
            } catch (err) { showAuthError('Lỗi kết nối'); }
        }

        async function doRegister() {
            const displayName = document.getElementById('regDisplayName').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, displayName })
                });
                const data = await res.json();
                if (data.error) return showAuthError(data.error);
                localStorage.setItem('easyrevise_token', data.token);
                localStorage.setItem('easyrevise_user', JSON.stringify(data));
                currentUser = data;
                closeAuthModal();
                updateAuthUI();
                loadHistory();
            } catch (err) { showAuthError('Lỗi kết nối'); }
        }

        function logout() {
            localStorage.removeItem('easyrevise_token');
            localStorage.removeItem('easyrevise_user');
            currentUser = null;
            updateAuthUI();
            document.getElementById('historySection').style.display = 'none';
        }

        function updateAuthUI() {
            const area = document.getElementById('authArea');
            if (currentUser) {
                const initial = (currentUser.displayName || currentUser.username).charAt(0).toUpperCase();
                area.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div class="user-avatar">${initial}</div>
                        <div>
                            <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-main);">${currentUser.displayName}</div>
                            <button style="background: none; border: none; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; padding: 0;" onclick="logout()">Đăng xuất</button>
                        </div>
                    </div>`;
            } else {
                area.innerHTML = `<button class="btn" style="background: var(--primary-light); color: var(--primary); font-size: 0.9rem;" onclick="openAuthModal()">Đăng nhập</button>`;
            }
        }

        // Load history
        async function loadHistory() {
            const token = localStorage.getItem('easyrevise_token');
            if (!token) return;

            try {
                const res = await fetch('/api/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) return;
                const history = await res.json();

                const section = document.getElementById('historySection');
                const container = document.getElementById('historyList');

                // Also check local history
                const localHistory = JSON.parse(localStorage.getItem('easyrevise_history') || '[]');
                const allHistory = history.length > 0 ? history : localHistory;
                _serverHistory = allHistory;

                if (!allHistory.length) {
                    section.style.display = 'none';
                    return;
                }

                section.style.display = 'block';
                container.innerHTML = allHistory.slice(0, 10).map((h, i) => {
                    const score = parseFloat(h.score);
                    const color = score >= 8 ? 'var(--success)' : score >= 5 ? '#d97706' : 'var(--error)';
                    const timeMin = Math.floor((h.timeSpent || 0) / 60);
                    return `
                        <div class="history-item" onclick="reviewResult(${i}, 'server')">
                            <div>
                                <div style="font-weight: 600; color: var(--text-main);">${h.examTitle || 'Đề thi'}</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">
                                    ${h.timestamp || ''} · ${h.correct}/${h.total} đúng · ${timeMin} phút
                                </div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <div class="history-score" style="color: ${color};">${h.score}</div>
                                <span style="font-size: 0.75rem; color: var(--primary);">Xem lại →</span>
                            </div>
                        </div>`;
                }).join('');
            } catch (err) {
                // Fallback to local
                const localHistory = JSON.parse(localStorage.getItem('easyrevise_history') || '[]');
                if (localHistory.length) {
                    document.getElementById('historySection').style.display = 'block';
                    document.getElementById('historyList').innerHTML = localHistory.slice(0, 10).map(h => {
                        const score = parseFloat(h.score);
                        const color = score >= 8 ? 'var(--success)' : score >= 5 ? '#d97706' : 'var(--error)';
                        return `
                            <div class="history-item">
                                <div>
                                    <div style="font-weight: 600;">${h.examTitle || 'Đề thi'}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-muted);">${h.timestamp || ''} · ${h.correct}/${h.total} đúng</div>
                                </div>
                                <div class="history-score" style="color: ${color};">${h.score}</div>
                            </div>`;
                    }).join('');
                }
            }
        }

        let _serverHistory = [];

        // Review a past result
        function reviewResult(index, source) {
            let history;
            if (source === 'server') {
                history = _serverHistory;
            } else {
                history = JSON.parse(localStorage.getItem('easyrevise_history') || '[]');
            }
            const item = history[index];
            if (!item) return;
            sessionStorage.setItem('easyrevise_final_result', JSON.stringify(item));
            window.location.href = 'result.html';
        }

        // Load exams
        async function loadExams() {
            try {
                const res = await fetch('/api/exams');
                const exams = await res.json();
                const container = document.getElementById('examList');

                if (!exams.length) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 4rem; color: var(--text-muted); grid-column: 1 / -1;">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📝</div>
                            <p>Chưa có đề thi nào. Vui lòng liên hệ giáo viên để thêm đề!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = exams.map(exam => {
                    const unlocked = JSON.parse(localStorage.getItem('easyrevise_unlocked') || '{}');
                    const isLocked = exam.requireCode && !unlocked[exam.id];
                    const clickAction = isLocked ? `openCodeModal('${exam.id}', '${exam.title.replace(/'/g, "\\'")}')`  : `window.location.href='exam.html?id=${exam.id}'`;
                    return `
                    <div class="glass-panel exam-card" onclick="${clickAction}">
                        <h3>${isLocked ? '🔒 ' : ''}${exam.title}</h3>
                        <div class="meta">
                            <span>📝 ${exam.totalQuestions} câu</span>
                            <span>📂 ${exam.sectionCount} phần</span>
                            ${exam.totalEssays > 0 ? `<span>✍️ ${exam.totalEssays} bài luận</span>` : ''}
                        </div>
                        <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
                            ${exam.subject} — ${exam.year}
                        </p>
                        <span class="btn btn-primary" style="pointer-events: none;">${isLocked ? '🔑 Nhập mã để mở' : 'Bắt đầu ôn tập →'}</span>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error(err);
            }
        }

        // In-progress exams
        function loadInProgress() {
            const inProgress = JSON.parse(localStorage.getItem('easyrevise_in_progress') || '{}');
            const section = document.getElementById('inProgressSection');
            const container = document.getElementById('inProgressList');
            const entries = Object.entries(inProgress).filter(([id, data]) => data.answeredCount < data.totalQuestions);

            if (!entries.length) { section.style.display = 'none'; return; }

            section.style.display = 'block';
            container.innerHTML = entries.map(([id, data]) => {
                const percent = Math.round((data.answeredCount / data.totalQuestions) * 100);
                const timeAgo = getTimeAgo(data.lastAccessed);
                return `
                    <div class="inprogress-card" onclick="window.location.href='exam.html?id=${id}'">
                        <div>
                            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                                <span class="inprogress-badge">Đang làm</span>
                                <span style="font-weight: 600; color: var(--text-main);">${data.examTitle}</span>
                            </div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">
                                ${data.answeredCount}/${data.totalQuestions} câu · ${percent}% · ${timeAgo}
                            </div>
                        </div>
                        <span class="btn btn-primary" style="pointer-events: none; font-size: 0.8rem; padding: 0.4rem 0.8rem;">Tiếp tục →</span>
                    </div>`;
            }).join('');
        }

        function getTimeAgo(ts) {
            const diff = Date.now() - ts;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'vừa xong';
            if (mins < 60) return `${mins} phút trước`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours} giờ trước`;
            return `${Math.floor(hours / 24)} ngày trước`;
        }

        // Init
        const savedUser = localStorage.getItem('easyrevise_user');
        if (savedUser) {
            try { currentUser = JSON.parse(savedUser); } catch (e) {}
        }
        updateAuthUI();
        loadExams();
        loadInProgress();
        if (currentUser) loadHistory();
        // Also show local history even without login
        else {
            const localHistory = JSON.parse(localStorage.getItem('easyrevise_history') || '[]');
            if (localHistory.length) {
                document.getElementById('historySection').style.display = 'block';
                document.getElementById('historyList').innerHTML = localHistory.slice(0, 10).map((h, i) => {
                    const score = parseFloat(h.score);
                    const color = score >= 8 ? 'var(--success)' : score >= 5 ? '#d97706' : 'var(--error)';
                    const timeMin = Math.floor((h.timeSpent || 0) / 60);
                    return `<div class="history-item" onclick="reviewResult(${i}, 'local')">
                        <div>
                            <div style="font-weight: 600; color: var(--text-main);">${h.examTitle || 'Đề thi'}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">${h.timestamp || ''} · ${h.correct}/${h.total} đúng · ${timeMin} phút</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <div class="history-score" style="color: ${color};">${h.score}</div>
                            <span style="font-size: 0.75rem; color: var(--primary);">Xem lại →</span>
                        </div>
                    </div>`;
                }).join('');
            }
        }

        // Code entry modal
        let _pendingCodeExamId = null;
        function openCodeModal(examId, title) {
            _pendingCodeExamId = examId;
            document.getElementById('codeExamTitle').textContent = title;
            document.getElementById('codeInput').value = '';
            document.getElementById('codeError').style.display = 'none';
            document.getElementById('codeModal').classList.add('active');
            setTimeout(() => document.getElementById('codeInput').focus(), 100);
        }
        async function submitCode() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) return;
            try {
                const userId = currentUser?.id || 'anonymous';
                const res = await fetch(`/api/exams/${_pendingCodeExamId}/verify-code`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, userId })
                });
                const data = await res.json();
                if (data.error) { document.getElementById('codeError').textContent = data.error; document.getElementById('codeError').style.display = 'block'; return; }
                // Save unlocked state
                const unlocked = JSON.parse(localStorage.getItem('easyrevise_unlocked') || '{}');
                unlocked[_pendingCodeExamId] = data.code;
                localStorage.setItem('easyrevise_unlocked', JSON.stringify(unlocked));
                document.getElementById('codeModal').classList.remove('active');
                window.location.href = `exam.html?id=${_pendingCodeExamId}`;
            } catch { document.getElementById('codeError').textContent = 'Lỗi kết nối'; document.getElementById('codeError').style.display = 'block'; }
        }
        document.getElementById('codeInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') submitCode(); });
    </script>
</body>
</html>
