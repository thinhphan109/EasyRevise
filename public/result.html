<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả - EasyRevise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <header class="result-header">
            <h1 style="font-size: 2rem;">Kết Quả Ôn Tập</h1>
            <p class="subtitle" id="examDate">Hoàn thành vào: --:--</p>
        </header>

        <section class="glass-panel" style="padding: 2.5rem; text-align: center; margin-bottom: 2rem;">
            <div class="score-circle">
                <span id="scoreValue" class="score-value">0.0</span>
                <span id="scoreLabel" class="score-label">Điểm (Thang 10)</span>
            </div>

            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-top: 2rem;">
                <div style="background: rgba(34, 197, 94, 0.1); padding: 1rem; border-radius: 16px;">
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--success);" id="correctCount">0</div>
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Câu Đúng</div>
                </div>
                <div style="background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 16px;">
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--error);" id="incorrectCount">0</div>
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Câu Sai</div>
                </div>
                <div style="background: rgba(245, 158, 11, 0.1); padding: 1rem; border-radius: 16px;">
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--warning);" id="skipCount">0</div>
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Bỏ Qua</div>
                </div>
                <div style="background: rgba(99, 102, 241, 0.1); padding: 1rem; border-radius: 16px;">
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary);" id="timeSpent">--</div>
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Thời Gian</div>
                </div>
            </div>

            <div style="margin-top: 3rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="/" class="btn" style="background: rgba(255,255,255,0.1); color: var(--text-main);">← Về trang chủ</a>
                <a id="retakeBtn" href="#" class="btn btn-primary">Làm lại bài này</a>
            </div>
        </section>

        <section id="reviewSection">
            <h2 style="font-size: 1.5rem; margin-bottom: 2rem; color: var(--text-main); font-weight: 700;">📚 Xem lại đáp án & Giải thích chi tiết</h2>
            <div id="reviewContainer"></div>
        </section>

        <footer style="text-align: center; margin-top: 4rem; padding-bottom: 2rem; color: var(--text-muted); font-size: 0.875rem;">
            &copy; 2026 EasyRevise — English Learning Companion
        </footer>
    </div>

    <script src="js/result.js"></script>
</body>
</html>
