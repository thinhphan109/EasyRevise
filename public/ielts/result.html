<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả IELTS · EasyRevise</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
    <script>
        (function () { var t = localStorage.getItem('easyrevise_theme') || 'light'; document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <style>
        :root {
            --bg: #fbfbfb; --surface: #ffffff; --surface-2: #f5f5f5;
            --text: #1a1a1a; --text-2: #555; --text-muted: #999;
            --border: #e5e5e5; --border-strong: #d4d4d4;
            --accent: #0066ff; --accent-soft: #e6f0ff;
            --success: #16a34a; --success-soft: #dcfce7;
            --danger: #dc2626; --danger-soft: #fee2e2;
            --highlight: #fef3c7;
            --shadow-1: 0 1px 2px rgba(0,0,0,0.04);
        }
        [data-theme="dark"] {
            --bg: #0d0d0d; --surface: #161616; --surface-2: #202020;
            --text: #f5f5f5; --text-2: #b0b0b0; --text-muted: #707070;
            --border: #262626; --border-strong: #333;
            --accent: #4d8eff; --accent-soft: #1a2942;
            --success: #4ade80; --success-soft: #14532d;
            --danger: #f87171; --danger-soft: #7f1d1d;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
            font-feature-settings: 'cv11', 'ss01';
            letter-spacing: -0.005em;
        }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand {
            display: flex; align-items: center; gap: 0.5rem;
            font-weight: 600; font-size: 0.95rem;
            text-decoration: none; color: var(--text);
        }
        .brand-mark {
            width: 26px; height: 26px;
            background: var(--text); color: var(--bg);
            border-radius: 7px;
            display: grid; place-items: center;
            font-weight: 700; font-size: 0.7rem;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

        .summary {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem 2.25rem;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 2rem; align-items: center;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-1);
        }
        .band-block { display: flex; align-items: baseline; gap: 0.5rem; }
        .band-display {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 4rem; font-weight: 600;
            line-height: 1; letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
        }
        .band-suffix { font-size: 0.95rem; color: var(--text-muted); }
        .summary-meta { font-size: 0.9rem; color: var(--text-2); line-height: 1.6; }
        .summary-meta strong { color: var(--text); font-weight: 600; }

        .btn {
            padding: 0.55rem 1.1rem;
            font-family: inherit; font-weight: 500; font-size: 0.85rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            cursor: pointer; text-decoration: none;
            transition: all .15s;
        }
        .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
        .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .col {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem 1.75rem;
        }
        .col h2 {
            font-size: 0.78rem; font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.06em; text-transform: uppercase;
            margin: 0 0 1.25rem;
        }
        .passage h3 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.5rem; font-weight: 600;
            margin: 0 0 1rem;
            letter-spacing: -0.02em;
        }
        .passage p {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.04rem; line-height: 1.75;
            color: var(--text);
            margin: 0 0 1rem;
        }
        .passage strong {
            color: var(--accent); font-weight: 600;
            background: linear-gradient(180deg, transparent 65%, var(--accent-soft) 65%);
            padding: 0 0.1em;
        }

        .q-row {
            padding: 0.85rem 0;
            border-bottom: 1px solid var(--border);
        }
        .q-row:last-child { border-bottom: 0; }
        .q-head {
            display: flex; align-items: center; gap: 0.6rem;
            margin-bottom: 0.45rem;
        }
        .q-num {
            font-size: 0.78rem; font-weight: 600;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        .q-pill {
            font-size: 0.72rem; font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
        }
        .q-pill.ok { background: var(--success-soft); color: var(--success); }
        .q-pill.bad { background: var(--danger-soft); color: var(--danger); }
        .q-pill.partial { background: #fef3c7; color: #92400e; }
        .q-prompt {
            font-size: 0.94rem; line-height: 1.5;
            margin-bottom: 0.5rem;
        }
        .q-answers {
            display: grid; grid-template-columns: auto 1fr; gap: 0.3rem 0.85rem;
            font-size: 0.86rem; line-height: 1.5;
            background: var(--surface-2);
            padding: 0.6rem 0.85rem;
            border-radius: 7px;
        }
        .q-answers .label {
            color: var(--text-muted); font-weight: 500;
            font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .q-answers .val { color: var(--text); }
        .q-answers .val.ok { color: var(--success); font-weight: 500; }
        .q-answers .val.bad { color: var(--danger); font-weight: 500; }
        .explanation {
            margin-top: 0.55rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem; color: var(--text-2);
            background: var(--accent-soft);
            border-radius: 7px;
            border-left: 3px solid var(--accent);
        }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .summary { grid-template-columns: 1fr; text-align: center; }
        }

        .empty {
            text-align: center; padding: 3rem 1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="/ielts">
            <div class="brand-mark">ER</div>
            <span>EasyRevise</span>
        </a>
        <a class="btn" href="/ielts">← Quay lại</a>
    </div>

    <main class="container" id="root">
        <div class="empty">Đang tải kết quả…</div>
    </main>

    <script src="/ielts/_shared/ielts-runtime.js"></script>
    <script>
        const R = window.IeltsRuntime;
        const SUB_ID = R.getQuery('id');
        if (!SUB_ID) { window.location.href = '/ielts'; throw new Error('no id'); }
        if (!R.ensureLogin()) throw new Error('not logged in');

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, ch =>
                ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
        }

        function fmtAnswer(val) {
            if (val == null) return '<em>không trả lời</em>';
            if (Array.isArray(val)) return val.map(v => String.fromCharCode(65 + Number(v))).join(', ');
            if (typeof val === 'object') {
                return Object.entries(val).map(([k, v]) => `${escapeHtml(k)} → ${escapeHtml(v || '—')}`).join(', ');
            }
            if (typeof val === 'number') return String.fromCharCode(65 + val);
            return escapeHtml(String(val));
        }

        function fmtCorrect(q) {
            return fmtAnswer(q.correct);
        }

        function renderBody(md) {
            return md.split(/\n\n+/).map(par =>
                `<p>${escapeHtml(par).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`
            ).join('');
        }

        function pillFor(pq) {
            if (pq.isCorrect) return '<span class="q-pill ok">✓ Đúng</span>';
            if (pq.points > 0) return `<span class="q-pill partial">${pq.points}/${pq.max} đúng</span>`;
            return '<span class="q-pill bad">✗ Sai</span>';
        }

        async function load() {
            try {
                const { submission, test } = await R.getSubmission(SUB_ID);
                const flat = R.flattenQuestions(test);
                const perQ = submission.perQuestion || [];
                const perQById = Object.fromEntries(perQ.map(p => [p.id, p]));

                const root = document.getElementById('root');
                const dur = submission.durationSec
                    ? `${Math.floor(submission.durationSec / 60)}p ${submission.durationSec % 60}s`
                    : '—';

                root.innerHTML = `
                    <section class="summary">
                        <div class="band-block">
                            <span class="band-display">${(submission.bandScore ?? 0).toFixed(1)}</span>
                            <span class="band-suffix">/ 9.0</span>
                        </div>
                        <div class="summary-meta">
                            <div><strong>${escapeHtml(test.title)}</strong></div>
                            <div>Raw: <strong>${submission.rawScore ?? 0}</strong> · Thời gian làm: ${dur}</div>
                            <div>Nộp lúc: ${submission.submittedAt ? new Date(submission.submittedAt).toLocaleString('vi-VN') : '—'}</div>
                        </div>
                        <a class="btn btn-primary" href="/ielts/test.html?id=${test.id}">Làm lại</a>
                    </section>

                    <div class="layout">
                        <section class="col passage">
                            <h2>Reading Passage</h2>
                            ${(test.passages || []).map(p => `
                                <h3>${escapeHtml(p.title || '')}</h3>
                                ${renderBody(p.body)}
                            `).join('')}
                        </section>

                        <section class="col">
                            <h2>Đáp án chi tiết</h2>
                            ${flat.map((q, i) => {
                                const pq = perQById[q.id] || { isCorrect: false, points: 0, max: 1, given: null };
                                return `<div class="q-row">
                                    <div class="q-head">
                                        <span class="q-num">${i + 1}</span>
                                        ${pillFor(pq)}
                                    </div>
                                    <div class="q-prompt">${escapeHtml(q.prompt)}</div>
                                    <div class="q-answers">
                                        <span class="label">Bạn:</span>
                                        <span class="val ${pq.isCorrect ? 'ok' : 'bad'}">${fmtAnswer(pq.given)}</span>
                                        <span class="label">Đúng:</span>
                                        <span class="val ok">${fmtCorrect(q)}</span>
                                    </div>
                                    ${q.explanation ? `<div class="explanation">${escapeHtml(q.explanation)}</div>` : ''}
                                </div>`;
                            }).join('')}
                        </section>
                    </div>
                `;
            } catch (e) {
                document.getElementById('root').innerHTML =
                    `<div class="empty">Không tải được kết quả: ${escapeHtml(e.message)}</div>`;
            }
        }
        load();
    </script>
    <script src="/js/ielts-bootstrap.js"></script>

</body>
</html>
