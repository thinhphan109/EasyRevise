<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả của tôi · EasyRevise</title>
    <meta name="description" content="Lịch sử bài làm TracNghiệm và IELTS với điểm số / band score chi tiết.">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
    <script>(function(){var t=localStorage.getItem('easyrevise_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        :root {
            --bg: #fbfbfb; --surface: #ffffff; --surface-2: #f5f5f5;
            --text: #1a1a1a; --text-2: #555; --text-muted: #999;
            --border: #e5e5e5; --border-strong: #d4d4d4;
            --accent: #0066ff;
            --reading: #0066ff;  --reading-soft: #e6f0ff;
            --listening: #16a34a; --listening-soft: #dcfce7;
            --writing: #d97706;  --writing-soft: #fef3c7;
            --speaking: #9333ea; --speaking-soft: #f3e8ff;
            --quiz: #ec4899;     --quiz-soft: #fce7f3;
            --shadow-1: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-2: 0 4px 16px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg: #0d0d0d; --surface: #161616; --surface-2: #202020;
            --text: #f5f5f5; --text-2: #b0b0b0; --text-muted: #707070;
            --border: #262626; --border-strong: #333;
            --reading-soft: #1a2942; --listening-soft: #14532d;
            --writing-soft: #422006; --speaking-soft: #3b0764;
            --quiz-soft: #500724;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
            font-feature-settings: 'cv11', 'ss01';
            letter-spacing: -0.005em;
        }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; text-decoration: none; color: var(--text); }
        .brand-mark { width: 26px; height: 26px; background: var(--text); color: var(--bg); border-radius: 7px; display: grid; place-items: center; font-weight: 700; font-size: 0.7rem; }
        .nav-link { font-size: 0.85rem; color: var(--text-2); text-decoration: none; padding: 0.4rem 0.8rem; border-radius: 7px; }
        .nav-link:hover { background: var(--surface-2); color: var(--text); }

        .container { max-width: 980px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
        .page-header { margin-bottom: 2rem; }
        .page-eyebrow { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; }
        .page-header h1 { font-family: 'Source Serif 4', Georgia, serif; font-size: 2.2rem; font-weight: 600; margin: 0 0 0.4rem; letter-spacing: -0.025em; }
        .page-header p { margin: 0; color: var(--text-2); font-size: 0.95rem; line-height: 1.55; }

        /* Stat cards */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--c-soft, transparent), transparent 60%);
            opacity: 0.6; pointer-events: none;
        }
        .stat-card[data-skill="reading"]   { --c: var(--reading);   --c-soft: var(--reading-soft); }
        .stat-card[data-skill="listening"] { --c: var(--listening); --c-soft: var(--listening-soft); }
        .stat-card[data-skill="writing"]   { --c: var(--writing);   --c-soft: var(--writing-soft); }
        .stat-card[data-skill="speaking"]  { --c: var(--speaking);  --c-soft: var(--speaking-soft); }
        .stat-card[data-skill="quiz"]      { --c: var(--quiz);      --c-soft: var(--quiz-soft); }
        .stat-card .label {
            font-size: 0.72rem; font-weight: 600;
            color: var(--c, var(--text-muted));
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: 0.4rem; position: relative;
        }
        .stat-card .big {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 2rem; font-weight: 600; line-height: 1;
            font-variant-numeric: tabular-nums;
            position: relative;
        }
        .stat-card .foot {
            margin-top: 0.55rem;
            font-size: 0.78rem; color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            position: relative;
        }
        .stat-card .empty {
            color: var(--text-muted);
            font-style: italic; font-size: 1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        /* Filter chips */
        .filter-row {
            display: flex; gap: 0.4rem; flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .chip {
            font-family: inherit; font-size: 0.82rem; font-weight: 500;
            padding: 0.35rem 0.85rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-2); cursor: pointer;
            transition: all .15s;
        }
        .chip:hover { color: var(--text); border-color: var(--border-strong); }
        .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        .chip .count { opacity: 0.6; margin-left: 0.3rem; font-variant-numeric: tabular-nums; }

        /* Result list */
        .result-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .result-row {
            display: grid;
            grid-template-columns: 50px 1fr auto auto auto;
            gap: 1rem;
            align-items: center;
            padding: 0.85rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            transition: all .12s;
        }
        .result-row:hover {
            border-color: var(--c, var(--border-strong));
            transform: translateY(-1px);
            box-shadow: var(--shadow-1);
        }
        .result-row[data-skill="reading"]   { --c: var(--reading); }
        .result-row[data-skill="listening"] { --c: var(--listening); }
        .result-row[data-skill="writing"]   { --c: var(--writing); }
        .result-row[data-skill="speaking"]  { --c: var(--speaking); }
        .result-row[data-skill="quiz"]      { --c: var(--quiz); }

        .result-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: var(--c-soft, var(--surface-2));
            color: var(--c, var(--text));
            display: grid; place-items: center;
            font-size: 1.15rem;
        }
        .result-row[data-skill="reading"]   .result-icon { background: var(--reading-soft); }
        .result-row[data-skill="listening"] .result-icon { background: var(--listening-soft); }
        .result-row[data-skill="writing"]   .result-icon { background: var(--writing-soft); }
        .result-row[data-skill="speaking"]  .result-icon { background: var(--speaking-soft); }
        .result-row[data-skill="quiz"]      .result-icon { background: var(--quiz-soft); }

        .result-info { min-width: 0; }
        .result-title { font-weight: 600; font-size: 0.95rem; line-height: 1.3; margin: 0 0 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .result-meta { font-size: 0.78rem; color: var(--text-muted); display: flex; gap: 0.5rem; align-items: center; }
        .result-meta-pill {
            font-size: 0.7rem; font-weight: 600;
            padding: 0.1rem 0.5rem; border-radius: 999px;
            background: var(--surface-2);
            color: var(--text-2);
        }

        .result-band {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.5rem; font-weight: 600;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            color: var(--c, var(--text));
            min-width: 60px; text-align: right;
        }
        .result-arrow { color: var(--text-muted); font-size: 1rem; }

        .result-hide {
            background: none; border: 1px solid transparent;
            border-radius: 7px; padding: 0.3rem 0.55rem;
            color: var(--text-muted); cursor: pointer;
            font-family: inherit; font-size: 0.95rem;
            line-height: 1; transition: all .15s;
        }
        .result-hide:hover {
            background: var(--surface-2);
            border-color: var(--border);
            color: var(--danger, #e11d48);
        }

        .result-empty {
            text-align: center; padding: 4rem 1.5rem;
            color: var(--text-muted);
        }
        .result-empty p { margin: 0.5rem 0; line-height: 1.55; }
        .result-empty a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .result-empty a:hover { text-decoration: underline; }

        @media (max-width: 720px) {
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
            .result-row { grid-template-columns: 40px 1fr auto; }
            .result-arrow { display: none; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="/">
            <div class="brand-mark">ER</div>
            <span>EasyRevise</span>
        </a>
        <nav style="display:flex;gap:0.4rem;">
            <a class="nav-link" href="/ielts/">IELTS</a>
            <a class="nav-link" href="/dashboard.html">Dashboard</a>
        </nav>
    </div>

    <main class="container">
        <header class="page-header">
            <div class="page-eyebrow">EasyRevise · Kết quả</div>
            <h1>Kết quả của tôi</h1>
            <p>Lịch sử bài làm trên cả TracNghiệm và IELTS. Click từng bài để xem feedback chi tiết.</p>
        </header>

        <section class="stat-grid" id="statGrid">
            <div class="stat-card" data-skill="reading">
                <div class="label">Reading</div>
                <div class="big" id="stat-reading-band">…</div>
                <div class="foot" id="stat-reading-foot">—</div>
            </div>
            <div class="stat-card" data-skill="listening">
                <div class="label">Listening</div>
                <div class="big" id="stat-listening-band">…</div>
                <div class="foot" id="stat-listening-foot">—</div>
            </div>
            <div class="stat-card" data-skill="writing">
                <div class="label">Writing</div>
                <div class="big" id="stat-writing-band">…</div>
                <div class="foot" id="stat-writing-foot">—</div>
            </div>
            <div class="stat-card" data-skill="speaking">
                <div class="label">Speaking</div>
                <div class="big" id="stat-speaking-band">…</div>
                <div class="foot" id="stat-speaking-foot">—</div>
            </div>
            <div class="stat-card" data-skill="quiz">
                <div class="label">Trắc nghiệm</div>
                <div class="big" id="stat-quiz-band">…</div>
                <div class="foot" id="stat-quiz-foot">—</div>
            </div>
        </section>

        <div class="filter-row" id="filterRow">
            <button class="chip active" data-filter="">Tất cả <span class="count" id="count-all">0</span></button>
            <button class="chip" data-filter="reading">Reading <span class="count" id="count-reading">0</span></button>
            <button class="chip" data-filter="listening">Listening <span class="count" id="count-listening">0</span></button>
            <button class="chip" data-filter="writing">Writing <span class="count" id="count-writing">0</span></button>
            <button class="chip" data-filter="speaking">Speaking <span class="count" id="count-speaking">0</span></button>
            <button class="chip" data-filter="quiz">Trắc nghiệm <span class="count" id="count-quiz">0</span></button>
        </div>

        <section class="result-list" id="resultList">
            <div class="result-empty"><p>Đang tải…</p></div>
        </section>
    </main>

    <script>
        const ICONS = { reading: '📖', listening: '🎧', writing: '✍️', speaking: '🎤', quiz: '📝' };
        const SKILL_LABELS = { reading: 'Reading', listening: 'Listening', writing: 'Writing', speaking: 'Speaking', quiz: 'Trắc nghiệm' };
        let STATE = { all: [], filter: '' };

        function getToken() { return localStorage.getItem('easyrevise_token'); }

        function fmtDate(s) {
            if (!s) return '—';
            const d = new Date(s);
            const diff = (Date.now() - d.getTime()) / 1000;
            if (diff < 60) return 'vừa xong';
            if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
            if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
            if (diff < 7 * 86400) return Math.floor(diff / 86400) + ' ngày trước';
            return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: '2-digit' });
        }
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
        }

        function resultUrl(r) {
            if (r.skillKind === 'reading')  return `/ielts/result.html?id=${r.submissionId}`;
            if (r.skillKind === 'writing')  return `/ielts/writing/result.html?id=${r.submissionId}`;
            if (r.skillKind === 'speaking') return `/ielts/speaking/result.html?id=${r.submissionId}`;
            if (r.skillKind === 'quiz' && r.quizExamId) {
                // TracNghiem result page expects ?examId=&submissionId=
                return `/result.html?examId=${encodeURIComponent(r.quizExamId)}&submissionId=${r.submissionId}`;
            }
            return '#';
        }

        function renderStats(stats) {
            // Reading + Listening share `ielts_submissions` table; backend returns
            // a single 'reading' stats row but listings have skill='listening' or
            // 'reading'. Compute both from the live list for accuracy.
            const fillBand = (s) => {
                const items = STATE.all.filter(r => r.skill === s);
                if (items.length === 0) {
                    document.getElementById(`stat-${s}-band`).innerHTML = '<span class="empty">—</span>';
                    document.getElementById(`stat-${s}-foot`).textContent = 'Chưa làm bài';
                    return;
                }
                const max = Math.max(...items.map(r => r.bandOverall || 0));
                const avg = items.reduce((acc, r) => acc + (r.bandOverall || 0), 0) / items.length;
                document.getElementById(`stat-${s}-band`).textContent = max.toFixed(1);
                document.getElementById(`stat-${s}-foot`).textContent = `${items.length} bài · TB ${avg.toFixed(1)}`;
            };

            // IELTS bands (0–9)
            ['reading', 'listening'].forEach(fillBand);
            ['writing', 'speaking'].forEach(s => {
                const data = stats?.[s];
                if (!data || data.count === 0) {
                    document.getElementById(`stat-${s}-band`).innerHTML = '<span class="empty">—</span>';
                    document.getElementById(`stat-${s}-foot`).textContent = 'Chưa làm bài';
                    return;
                }
                document.getElementById(`stat-${s}-band`).textContent = (data.maxBand || 0).toFixed(1);
                document.getElementById(`stat-${s}-foot`).textContent = `${data.count} bài · TB ${(data.avgBand || 0).toFixed(1)}`;
            });

            // Quiz score (0–10)
            const q = stats?.quiz;
            if (!q || q.count === 0) {
                document.getElementById('stat-quiz-band').innerHTML = '<span class="empty">—</span>';
                document.getElementById('stat-quiz-foot').textContent = 'Chưa làm bài';
            } else {
                document.getElementById('stat-quiz-band').textContent = (q.maxScore || 0).toFixed(1);
                document.getElementById('stat-quiz-foot').textContent = `${q.count} bài · TB ${(q.avgScore || 0).toFixed(1)}`;
            }
        }

        function renderCounts() {
            const all = STATE.all;
            document.getElementById('count-all').textContent = all.length;
            ['reading', 'listening', 'writing', 'speaking', 'quiz'].forEach(s => {
                document.getElementById(`count-${s}`).textContent =
                    all.filter(r => r.skill === s).length;
            });
        }

        function renderList() {
            const list = document.getElementById('resultList');
            const filtered = STATE.filter
                ? STATE.all.filter(r => r.skill === STATE.filter)
                : STATE.all;

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="result-empty">
                        <p>Chưa có bài làm nào${STATE.filter ? ' cho mục này' : ''}.</p>
                        <p><a href="/">Bắt đầu luyện đề →</a></p>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map(r => {
                let scoreText = '—';
                if (r.skillKind === 'quiz') {
                    scoreText = r.overallScore != null ? r.overallScore.toFixed(1) : '—';
                } else if (r.bandOverall != null) {
                    scoreText = r.bandOverall.toFixed(1);
                }
                const partLabel = r.partNumber ? ` · Part ${r.partNumber}` : '';
                const skillLabel = SKILL_LABELS[r.skill] || r.skill;
                // All skill kinds support hide (quiz uses open_submissions table).
                return `
                    <div class="result-row" data-skill="${r.skill}" data-id="${r.submissionId}" data-kind="${r.skillKind}">
                        <a class="result-icon" href="${resultUrl(r)}" style="text-decoration:none;">${ICONS[r.skill] || '📄'}</a>
                        <a class="result-info" href="${resultUrl(r)}" style="text-decoration:none;color:inherit;min-width:0;">
                            <p class="result-title">${escapeHtml(r.title || 'Untitled')}</p>
                            <div class="result-meta">
                                <span class="result-meta-pill">${skillLabel}${partLabel}</span>
                                <span>${fmtDate(r.submittedAt)}</span>
                            </div>
                        </a>
                        <a class="result-band" href="${resultUrl(r)}" style="text-decoration:none;">${scoreText}</a>
                        ${`<button class="result-hide" data-act="hide" title="Xoá khỏi lịch sử của tôi (admin vẫn giữ bản lưu)">✕</button>`}
                    </div>`;
            }).join('');
        }

        async function load() {
            const tok = getToken();
            if (!tok) {
                document.getElementById('resultList').innerHTML = `
                    <div class="result-empty">
                        <p>Bạn cần đăng nhập để xem lịch sử.</p>
                        <p><a href="/?next=/ielts/my-results.html">Đăng nhập →</a></p>
                    </div>`;
                return;
            }
            try {
                const r = await fetch('/api/ielts/my-results', { headers: { Authorization: 'Bearer ' + tok } });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const j = await r.json();
                STATE.all = j.results || [];
                renderCounts();
                renderStats(j.stats);
                renderList();
            } catch (e) {
                document.getElementById('resultList').innerHTML = `
                    <div class="result-empty"><p>Không tải được kết quả: ${escapeHtml(e.message)}</p></div>`;
            }
        }

        document.getElementById('filterRow').addEventListener('click', e => {
            const btn = e.target.closest('.chip');
            if (!btn) return;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            STATE.filter = btn.dataset.filter;
            renderList();
        });

        // Hide-from-history handler
        document.getElementById('resultList').addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-act=hide]');
            if (!btn) return;
            const row = btn.closest('.result-row');
            const id = row?.dataset.id;
            const kind = row?.dataset.kind;
            if (!id || !kind) return;
            if (!confirm('Xoá bài này khỏi lịch sử của bạn?\n(Admin vẫn giữ bản ghi.)')) return;
            const path = kind === 'reading'  ? `/api/ielts/submissions/${id}/hide`
                       : kind === 'writing'  ? `/api/ielts/writing/submissions/${id}/hide`
                       : kind === 'speaking' ? `/api/ielts/speaking/submissions/${id}/hide`
                       : kind === 'quiz'     ? `/api/exams/quiz-submissions/${id}/hide`
                       : null;
            if (!path) return;
            btn.disabled = true; btn.textContent = '…';
            try {
                const r = await fetch(path, {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + getToken() }
                });
                if (!r.ok) throw new Error(await r.text());
                STATE.all = STATE.all.filter(x => x.submissionId !== id);
                renderCounts();
                renderList();
            } catch (err) {
                btn.disabled = false; btn.textContent = '✕';
                alert('Lỗi: ' + err.message);
            }
        });

        load();
    </script>
    <script src="/js/ielts-bootstrap.js"></script>

</body>
</html>
