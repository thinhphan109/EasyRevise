<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả Speaking · EasyRevise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
    <script>(function(){var t=localStorage.getItem('easyrevise_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        :root {
            --bg: #fbfbfb; --surface: #ffffff; --surface-2: #f5f5f5;
            --text: #1a1a1a; --text-2: #555; --text-muted: #999;
            --border: #e5e5e5; --border-strong: #d4d4d4;
            --accent: #9333ea; --accent-soft: #f3e8ff;
            --shadow-1: 0 1px 2px rgba(0,0,0,0.04);
        }
        [data-theme="dark"] {
            --bg: #0d0d0d; --surface: #161616; --surface-2: #202020;
            --text: #f5f5f5; --text-2: #b0b0b0; --text-muted: #707070;
            --border: #262626; --border-strong: #333;
            --accent-soft: #3b0764;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; font-feature-settings: 'cv11', 'ss01'; letter-spacing: -0.005em; }
        .topbar { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 92%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0.7rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; text-decoration: none; color: var(--text); }
        .brand-mark { width: 26px; height: 26px; background: var(--text); color: var(--bg); border-radius: 7px; display: grid; place-items: center; font-weight: 700; font-size: 0.7rem; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
        .summary { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.75rem 2rem; display: grid; grid-template-columns: auto 1fr; gap: 1.75rem; align-items: center; margin-bottom: 1.75rem; box-shadow: var(--shadow-1); }
        .band-block { display: flex; align-items: baseline; gap: 0.5rem; }
        .band-display { font-family: 'Source Serif 4', Georgia, serif; font-size: 4rem; font-weight: 600; line-height: 1; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
        .band-suffix { font-size: 0.9rem; color: var(--text-muted); }
        .summary-title { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.3rem; font-weight: 600; margin: 0 0 0.25rem; }
        .summary-meta { font-size: 0.85rem; color: var(--text-2); line-height: 1.5; }
        .criteria-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 2rem; }
        .criterion { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.2rem; text-align: center; }
        .criterion-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.4rem; }
        .criterion-value { font-family: 'Source Serif 4', Georgia, serif; font-size: 2rem; font-weight: 600; font-variant-numeric: tabular-nums; }
        .col { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem 1.75rem; margin-bottom: 1rem; }
        .col h2 { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin: 0 0 1rem; }
        .transcript-text { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.05rem; line-height: 1.75; white-space: pre-wrap; color: var(--text); }
        .feedback-block { margin-bottom: 1.25rem; font-size: 0.92rem; line-height: 1.6; }
        .feedback-block strong { display: block; margin-bottom: 0.3rem; color: var(--accent); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .feedback-block p { margin: 0; color: var(--text-2); }
        .btn { padding: 0.55rem 1.1rem; font-family: inherit; font-weight: 500; font-size: 0.85rem; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text); cursor: pointer; text-decoration: none; }
        .btn:hover { background: var(--surface-2); }
        @media (max-width: 720px) {
            .summary { grid-template-columns: 1fr; text-align: center; }
            .criteria-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="/ielts/speaking">
            <div class="brand-mark">ER</div>
            <span>EasyRevise</span>
        </a>
        <a class="btn" href="/ielts/speaking">← Đề khác</a>
    </div>

    <main class="container" id="root">
        <div class="empty">Đang tải kết quả…</div>
    </main>

    <script src="/ielts/_shared/ielts-runtime.js"></script>
    <script>
        const R = window.IeltsRuntime;
        const SUB_ID = R.getQuery('id');
        if (!SUB_ID) { location.href = '/ielts/speaking'; throw new Error('no id'); }
        if (!R.ensureLogin()) throw new Error('not logged in');

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
        }

        async function load() {
            try {
                const data = await R.api('GET', '/speaking/submissions/' + SUB_ID);
                const sub = data.submission;
                const part = data.part;

                const fb = sub.ai_feedback || {};
                const dur = sub.duration_sec ? `${Math.floor(sub.duration_sec / 60)}p ${sub.duration_sec % 60}s` : '—';

                document.getElementById('root').innerHTML = `
                    <section class="summary">
                        <div class="band-block">
                            <span class="band-display">${(Number(sub.band_overall) || 0).toFixed(1)}</span>
                            <span class="band-suffix">/ 9.0</span>
                        </div>
                        <div>
                            <h1 class="summary-title">Speaking · Part ${part.part_number}</h1>
                            <div class="summary-meta">${escapeHtml(part.title || '')}</div>
                            <div class="summary-meta">Thời gian: ${dur}</div>
                        </div>
                    </section>

                    <div class="criteria-grid">
                        <div class="criterion"><div class="criterion-label">FC</div><div class="criterion-value">${(Number(sub.band_fc) || 0).toFixed(1)}</div></div>
                        <div class="criterion"><div class="criterion-label">LR</div><div class="criterion-value">${(Number(sub.band_lr) || 0).toFixed(1)}</div></div>
                        <div class="criterion"><div class="criterion-label">GRA</div><div class="criterion-value">${(Number(sub.band_gra) || 0).toFixed(1)}</div></div>
                        <div class="criterion"><div class="criterion-label">Pron</div><div class="criterion-value">${(Number(sub.band_pron) || 0).toFixed(1)}</div></div>
                    </div>

                    ${sub.audio_url ? `
                    <section class="col">
                        <h2>Bản ghi âm</h2>
                        <audio controls preload="metadata" style="width:100%;"><source src="${escapeHtml(sub.audio_url)}"></audio>
                    </section>` : ''}

                    <section class="col">
                        <h2>Transcript</h2>
                        <div class="transcript-text">${escapeHtml(sub.transcript || '(không có transcript)')}</div>
                    </section>

                    <section class="col">
                        <h2>Đánh giá AI</h2>
                        ${fb.overall_comment ? `<div class="feedback-block"><strong>Tổng quan</strong><p>${escapeHtml(fb.overall_comment)}</p></div>` : ''}
                        ${fb.fc ? `<div class="feedback-block"><strong>Fluency & Coherence · ${(Number(sub.band_fc) || 0).toFixed(1)}</strong><p>${escapeHtml(fb.fc)}</p></div>` : ''}
                        ${fb.lr ? `<div class="feedback-block"><strong>Lexical Resource · ${(Number(sub.band_lr) || 0).toFixed(1)}</strong><p>${escapeHtml(fb.lr)}</p></div>` : ''}
                        ${fb.gra ? `<div class="feedback-block"><strong>Grammar · ${(Number(sub.band_gra) || 0).toFixed(1)}</strong><p>${escapeHtml(fb.gra)}</p></div>` : ''}
                        ${fb.pron ? `<div class="feedback-block"><strong>Pronunciation · ${(Number(sub.band_pron) || 0).toFixed(1)}</strong><p>${escapeHtml(fb.pron)}</p></div>` : ''}
                        ${(fb.suggestions || []).length ? `<div class="feedback-block"><strong>Đề xuất</strong><ul style="margin:0;padding-left:1.2rem;color:var(--text-2);">${fb.suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul></div>` : ''}
                    </section>
                `;
            } catch (e) {
                document.getElementById('root').innerHTML = `<div class="empty">Không tải được: ${escapeHtml(e.message)}</div>`;
            }
        }
        load();
    </script>
</body>
</html>
