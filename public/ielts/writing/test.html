<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Writing · EasyRevise</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/favicon-32.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
    <script>(function(){var t=localStorage.getItem('easyrevise_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        :root {
            --bg: #fbfbfb; --surface: #ffffff; --surface-2: #f5f5f5;
            --text: #1a1a1a; --text-2: #555; --text-muted: #999;
            --border: #e5e5e5; --border-strong: #d4d4d4;
            --accent: #d97706; --accent-soft: #fef3c7;
            --success: #16a34a; --warning: #d97706; --danger: #dc2626;
            --shadow-3: 0 16px 40px rgba(0,0,0,0.10);
        }
        [data-theme="dark"] {
            --bg: #0d0d0d; --surface: #161616; --surface-2: #202020;
            --text: #f5f5f5; --text-2: #b0b0b0; --text-muted: #707070;
            --border: #262626; --border-strong: #333;
            --accent-soft: #422006;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
            font-feature-settings: 'cv11', 'ss01';
            letter-spacing: -0.005em;
        }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            gap: 1rem;
        }
        .brand {
            display: flex; align-items: center; gap: 0.5rem;
            font-weight: 600; font-size: 0.95rem;
            text-decoration: none; color: var(--text);
        }
        .brand-mark {
            width: 26px; height: 26px;
            background: var(--text); color: var(--bg);
            border-radius: 7px; display: grid; place-items: center;
            font-weight: 700; font-size: 0.7rem;
        }
        .brand-divider { width: 1px; height: 18px; background: var(--border-strong); }
        .brand-skill {
            font-size: 0.78rem; font-weight: 600;
            padding: 0.18rem 0.5rem;
            background: var(--accent-soft); color: var(--accent);
            border-radius: 5px;
            letter-spacing: 0.02em;
        }

        #timer {
            font-size: 0.95rem; font-weight: 600;
            padding: 0.35rem 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-variant-numeric: tabular-nums;
        }
        #timer.warn { background: #fef3c7; border-color: #fbbf24; color: #92400e; }
        #timer.crit { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

        .save-status { font-size: 0.75rem; color: var(--text-muted); }
        .save-status.saving { color: var(--accent); }
        .save-status.saved { color: var(--success); }
        .save-status.error { color: var(--danger); }

        .btn {
            padding: 0.45rem 0.95rem;
            font-family: inherit; font-weight: 500; font-size: 0.85rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text); cursor: pointer;
            transition: all .15s;
        }
        .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
        .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-primary:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            min-height: 0;
        }
        .pane {
            background: var(--surface);
            overflow-y: auto; min-height: 0;
            padding: 2rem 2.25rem 2.5rem;
        }
        .pane:first-child { border-right: 1px solid var(--border); }

        .prompt-eyebrow {
            font-size: 0.74rem; font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em; text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .prompt-title {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.5rem; font-weight: 600;
            margin: 0 0 1.25rem;
            line-height: 1.3;
            letter-spacing: -0.02em;
        }
        .prompt-instruction {
            font-size: 0.9rem; line-height: 1.6;
            color: var(--text-2);
            padding: 0.85rem 1rem;
            background: var(--surface-2);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            margin-bottom: 1.25rem;
        }
        .prompt-image {
            width: 100%; max-width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 1.25rem;
            background: var(--surface-2);
        }
        .prompt-text {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.05rem; line-height: 1.7;
            color: var(--text);
        }

        .editor-wrap {
            display: flex; flex-direction: column;
            height: 100%;
            gap: 0.75rem;
        }
        .editor-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85rem; color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        .word-count {
            font-weight: 600; color: var(--text-2);
        }
        .word-count.ok { color: var(--success); }
        .word-count.under { color: var(--warning); }
        .essay-input {
            flex: 1;
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.05rem; line-height: 1.7;
            padding: 1rem 1.2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            resize: none; outline: none;
            transition: border .15s;
        }
        .essay-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center;
            z-index: 100; padding: 1rem;
        }
        .modal-backdrop.is-open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem 2.25rem 1.5rem;
            max-width: 600px; width: 100%;
            box-shadow: var(--shadow-3);
            max-height: 85vh; overflow-y: auto;
        }
        .modal-eyebrow {
            font-size: 0.74rem; font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em; text-transform: uppercase;
        }
        .modal h3 { margin: 0.5rem 0 1.25rem; font-size: 1.2rem; }
        .band-row { display: flex; align-items: baseline; gap: 0.6rem; margin-bottom: 1rem; }
        .band-display {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 4rem; font-weight: 600;
            line-height: 1; letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
        }
        .band-suffix { font-size: 0.95rem; color: var(--text-muted); }

        .criteria-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem; margin-bottom: 1.25rem;
        }
        .criterion {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.65rem 0.85rem;
            text-align: center;
        }
        .criterion-label {
            font-size: 0.7rem; color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.04em; text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        .criterion-value {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.4rem; font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .feedback-block { margin-bottom: 0.85rem; font-size: 0.88rem; line-height: 1.55; }
        .feedback-block strong { display: block; margin-bottom: 0.2rem; color: var(--accent); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .feedback-block p { margin: 0; color: var(--text-2); }

        .modal .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .loading {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem; z-index: 200;
        }
        .grading-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            color: white; font-size: 1rem;
            flex-direction: column; gap: 1rem;
            z-index: 150;
        }
        .grading-overlay.is-open { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg) } }

        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .pane:first-child { border-right: 0; border-bottom: 1px solid var(--border); }
            .criteria-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="/ielts/writing">
            <div class="brand-mark">ER</div>
            <span>EasyRevise</span>
            <span class="brand-divider"></span>
            <span class="brand-skill" id="skillLabel">IELTS Writing</span>
        </a>
        <div style="display:flex;gap:0.6rem;align-items:center;">
            <span class="save-status" id="saveStatus"></span>
            <span id="timer">--:--</span>
            <button class="btn" id="exitBtn" title="Thoát làm bài">✕ Thoát</button>
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        </div>
    </div>

    <div class="main">
        <section class="pane">
            <div class="prompt-eyebrow" id="taskBadge">Task —</div>
            <h1 class="prompt-title" id="promptTitle">Đang tải đề…</h1>
            <div class="prompt-instruction" id="instruction"></div>
            <img class="prompt-image" id="promptImage" alt="" hidden>
            <div class="prompt-text" id="promptText"></div>
        </section>

        <section class="pane">
            <div class="editor-wrap">
                <div class="editor-meta">
                    <span><span id="wordCount">0</span> / <span id="minWords">150</span> từ</span>
                    <span class="word-count" id="wordCountStatus"></span>
                </div>
                <textarea class="essay-input" id="essay" placeholder="Bắt đầu viết..."></textarea>
            </div>
        </section>
    </div>

    <div class="modal-backdrop" id="resultModal">
        <div class="modal">
            <div class="modal-eyebrow">AI đã chấm xong</div>
            <h3>Kết quả Writing</h3>
            <div class="band-row">
                <span class="band-display" id="bandOverall">—</span>
                <span class="band-suffix">Overall · / 9.0</span>
            </div>
            <div class="criteria-grid">
                <div class="criterion"><div class="criterion-label">TR</div><div class="criterion-value" id="bandTr">—</div></div>
                <div class="criterion"><div class="criterion-label">CC</div><div class="criterion-value" id="bandCc">—</div></div>
                <div class="criterion"><div class="criterion-label">LR</div><div class="criterion-value" id="bandLr">—</div></div>
                <div class="criterion"><div class="criterion-label">GRA</div><div class="criterion-value" id="bandGra">—</div></div>
            </div>
            <div id="feedback"></div>
            <div class="actions">
                <a class="btn" href="/ielts/writing" style="flex:1; text-align:center; text-decoration:none;">Đề khác</a>
                <button class="btn btn-primary" id="reviewBtn" style="flex:1;">Xem chi tiết</button>
            </div>
        </div>
    </div>

    <div class="grading-overlay" id="gradingOverlay">
        <div class="spinner"></div>
        <div>AI đang chấm bài… (~15-30s)</div>
    </div>

    <div class="loading" id="loading">Đang tải đề thi…</div>

    <script src="/ielts/_shared/ielts-runtime.js"></script>
    <script>
        const R = window.IeltsRuntime;
        const TEST_ID = R.getQuery('id');
        if (!TEST_ID) { location.href = '/ielts/writing'; throw new Error('no id'); }
        if (!R.ensureLogin()) throw new Error('not logged in');

        const state = { test: null, prompt: null, submissionId: null, durationLeft: 0, timerHandle: null, isComplete: false };

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
        }

        const setSaveStatus = (text, cls) => {
            const el = document.getElementById('saveStatus');
            el.textContent = text || '';
            el.className = 'save-status' + (cls ? ' ' + cls : '');
        };

        function countWords(t) { return (t || '').trim().split(/\s+/).filter(Boolean).length; }

        async function bootstrap() {
            const data = await R.api('GET', '/writing/tests/' + TEST_ID);
            state.test = data.test;
            state.prompt = data.prompt;

            const sub = await R.api('POST', '/writing/tests/' + TEST_ID + '/start');
            state.submissionId = sub.id;
            state.durationLeft = state.prompt.timeLimitSec || (state.prompt.taskType === 1 ? 1200 : 2400);

            renderPrompt();
            startTimer();
            document.getElementById('loading').remove();
        }

        function renderPrompt() {
            document.getElementById('taskBadge').textContent = `Task ${state.prompt.taskType}`;
            document.getElementById('promptTitle').textContent = state.test.title;
            document.getElementById('instruction').textContent = state.prompt.instruction;
            document.getElementById('promptText').textContent = state.prompt.promptText;
            if (state.prompt.graphImageUrl) {
                const img = document.getElementById('promptImage');
                img.src = state.prompt.graphImageUrl;
                img.hidden = false;
            }
            document.getElementById('minWords').textContent = state.prompt.minWords;
        }

        const debouncedSave = R.debounce(async () => {
            if (!state.submissionId || state.isComplete) return;
            setSaveStatus('Đang lưu…', 'saving');
            try {
                await R.api('POST', '/writing/submissions/' + state.submissionId + '/save', { essay: document.getElementById('essay').value });
                setSaveStatus('Đã lưu', 'saved');
                setTimeout(() => setSaveStatus(''), 1200);
            } catch (e) {
                setSaveStatus('Lưu lỗi', 'error');
            }
        }, 1500);

        document.getElementById('essay').addEventListener('input', e => {
            const wc = countWords(e.target.value);
            document.getElementById('wordCount').textContent = wc;
            const min = state.prompt?.minWords || 150;
            const status = document.getElementById('wordCountStatus');
            if (wc >= min) { status.textContent = '✓ Đã đủ'; status.className = 'word-count ok'; }
            else { status.textContent = `Cần thêm ${min - wc} từ`; status.className = 'word-count under'; }
            debouncedSave();
        });

        function startTimer() {
            const el = document.getElementById('timer');
            const tick = () => {
                el.textContent = R.formatTime(state.durationLeft);
                el.classList.toggle('warn', state.durationLeft <= 300 && state.durationLeft > 60);
                el.classList.toggle('crit', state.durationLeft <= 60);
                if (state.durationLeft <= 0) {
                    clearInterval(state.timerHandle);
                    submitNow(true);
                    return;
                }
                state.durationLeft--;
            };
            tick();
            state.timerHandle = setInterval(tick, 1000);
        }

        async function submitNow(expired) {
            if (state.isComplete) return;
            const essay = document.getElementById('essay').value;
            const wc = countWords(essay);
            if (!expired) {
                if (wc < 50) { window.notifyPopup({ message: 'Bài viết quá ngắn để chấm.', type: 'warning' }); return; }
                if (window.confirmPopup) {
                    const ok = await window.confirmPopup({
                        title: 'Nộp bài Writing?',
                        message: `Bài viết hiện ${wc} từ. Sau khi nộp bạn không thể chỉnh sửa nữa.`,
                        confirmText: 'Nộp bài',
                        cancelText: 'Tiếp tục viết',
                        type: 'info'
                    });
                    if (!ok) return;
                } else if (!confirm(`Nộp bài ngay? (${wc} từ)`)) return;
            }
            state.isComplete = true;
            clearInterval(state.timerHandle);
            document.getElementById('gradingOverlay').classList.add('is-open');
            try {
                const r = await R.api('POST', '/writing/submissions/' + state.submissionId + '/submit', { essay });
                document.getElementById('gradingOverlay').classList.remove('is-open');
                document.getElementById('bandOverall').textContent = r.band.overall.toFixed(1);
                document.getElementById('bandTr').textContent = r.band.tr.toFixed(1);
                document.getElementById('bandCc').textContent = r.band.cc.toFixed(1);
                document.getElementById('bandLr').textContent = r.band.lr.toFixed(1);
                document.getElementById('bandGra').textContent = r.band.gra.toFixed(1);
                const fb = r.feedback || {};
                document.getElementById('feedback').innerHTML = `
                    ${fb.overall_comment ? `<div class="feedback-block"><strong>Tổng quan</strong><p>${escapeHtml(fb.overall_comment)}</p></div>` : ''}
                    ${fb.tr ? `<div class="feedback-block"><strong>Task Response</strong><p>${escapeHtml(fb.tr)}</p></div>` : ''}
                    ${fb.cc ? `<div class="feedback-block"><strong>Coherence & Cohesion</strong><p>${escapeHtml(fb.cc)}</p></div>` : ''}
                    ${fb.lr ? `<div class="feedback-block"><strong>Lexical Resource</strong><p>${escapeHtml(fb.lr)}</p></div>` : ''}
                    ${fb.gra ? `<div class="feedback-block"><strong>Grammar</strong><p>${escapeHtml(fb.gra)}</p></div>` : ''}
                    ${(fb.suggestions || []).length ? `<div class="feedback-block"><strong>Đề xuất cải thiện</strong><ul style="margin:0;padding-left:1.2rem;color:var(--text-2);">${fb.suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul></div>` : ''}
                `;
                document.getElementById('reviewBtn').onclick = () => location.href = '/ielts/writing/result.html?id=' + state.submissionId;
                document.getElementById('resultModal').classList.add('is-open');
            } catch (e) {
                document.getElementById('gradingOverlay').classList.remove('is-open');
                window.notifyPopup({ title: 'Chấm bài lỗi', message: e.message, type: 'error' });
                state.isComplete = false;
            }
        }

        document.getElementById('submitBtn').addEventListener('click', () => submitNow(false));
        document.getElementById('exitBtn')?.addEventListener('click', async () => {
            if (state.isComplete) { window.location.href = '/ielts/writing'; return; }
            const choice = await (window.confirmPopup
                ? window.confirmPopup({
                    title: 'Thoát khi đang viết?',
                    message: 'Bài viết đã được lưu nháp tự động. Bạn có thể quay lại viết tiếp hoặc huỷ phiên làm bài.',
                    confirmText: 'Huỷ phiên (mất bài viết)',
                    cancelText: 'Lưu nháp & Thoát',
                    type: 'warning'
                })
                : Promise.resolve(window.confirm('Huỷ phiên làm bài này?')));
            if (choice) {
                try { await R.api('DELETE', '/writing/submissions/' + state.submissionId); } catch {}
            } else {
                try { await R.api('POST', '/writing/submissions/' + state.submissionId + '/save', { essay: document.getElementById('essay').value }); } catch {}
            }
            clearInterval(state.timerHandle);
            state.isComplete = true;
            window.location.href = '/ielts/writing';
        });
        window.addEventListener('beforeunload', (e) => {
            if (state.isComplete) return;
            e.preventDefault(); e.returnValue = '';
        });

        bootstrap().catch(e => {
            document.getElementById('loading').textContent = 'Lỗi: ' + e.message;
        });
    </script>
    <script src="/js/ielts-bootstrap.js"></script>

</body>
</html>
